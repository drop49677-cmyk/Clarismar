<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" fill="none">
  <defs>
    <linearGradient id="abg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#103a5c"/>
      <stop offset="100%" stop-color="#1fb6c9"/>
    </linearGradient>
    <linearGradient id="aglass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.5)"/>
      <stop offset="100%" stop-color="rgba(139,232,240,0.2)"/>
    </linearGradient>
  </defs>
  <rect width="500" height="500" fill="url(#abg)"/>
  <circle cx="120" cy="120" r="120" fill="rgba(139,232,240,0.16)"/>
  <circle cx="400" cy="420" r="140" fill="rgba(255,255,255,0.08)"/>
  <!-- Worker silhouette measuring glass -->
  <!-- glass sheet -->
  <rect x="150" y="120" width="240" height="300" rx="6" fill="url(#aglass)" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
  <line x1="180" y1="150" x2="250" y2="340" stroke="rgba(255,255,255,0.6)" stroke-width="3"/>
  <line x1="205" y1="150" x2="275" y2="300" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <!-- measuring tape line -->
  <line x1="150" y1="135" x2="390" y2="135" stroke="#f2c14e" stroke-width="4" stroke-dasharray="10 6"/>
  <!-- ruler marks -->
  <g stroke="#f2c14e" stroke-width="2">
    <line x1="180" y1="128" x2="180" y2="142"/>
    <line x1="220" y1="128" x2="220" y2="142"/>
    <line x1="260" y1="128" x2="260" y2="142"/>
    <line x1="300" y1="128" x2="300" y2="142"/>
    <line x1="340" y1="128" x2="340" y2="142"/>
  </g>
  <text x="250" y="470" text-anchor="middle" font-family="sans-serif" font-size="16" fill="rgba(255,255,255,0.85)">Trabajo de precisión</text>
</svg>
