<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="g4bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5f8fa"/>
      <stop offset="100%" stop-color="#eaf1f5"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="12" fill="url(#g4bg)"/>
  <!-- Shower division -->
  <rect x="60" y="30" width="4" height="240" fill="#777"/>
  <rect x="60" y="30" width="180" height="240" fill="rgba(173,235,242,0.25)" stroke="rgba(100,180,200,0.5)" stroke-width="1.5"/>
  <!-- Glass reflections -->
  <line x1="80" y1="40" x2="100" y2="120" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <line x1="90" y1="40" x2="110" y2="100" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <!-- Door handle -->
  <rect x="225" y="130" width="8" height="50" rx="4" fill="#999"/>
  <!-- Fixed panel -->
  <rect x="250" y="30" width="90" height="240" fill="rgba(173,235,242,0.2)" stroke="rgba(100,180,200,0.4)" stroke-width="1.5"/>
  <line x1="260" y1="40" x2="275" y2="100" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <!-- Floor -->
  <rect x="40" y="270" width="320" height="10" rx="2" fill="#ddd"/>
  <!-- Shower head -->
  <rect x="290" y="20" width="4" height="40" fill="#888"/>
  <ellipse cx="292" cy="60" rx="12" ry="5" fill="#aaa"/>
  <!-- Water drops -->
  <circle cx="285" cy="72" r="2" fill="rgba(100,180,220,0.5)"/>
  <circle cx="295" cy="78" r="1.5" fill="rgba(100,180,220,0.4)"/>
  <circle cx="290" cy="85" r="2" fill="rgba(100,180,220,0.3)"/>
  <!-- Label -->
  <text x="200" y="290" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#0a2540" opacity="0.6">Vidrio templado para banos</text>
</svg>
