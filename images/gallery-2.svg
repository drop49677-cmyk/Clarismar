      <stop offset="0%" stop-color="#faf5ee"/>
      <stop offset="100%" stop-color="#f2ece2"/>
    </linearGradient>
    <linearGradient id="g2frame" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c49a6c"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="12" fill="url(#g2bg)"/>
  <!-- Framed artwork -->
  <rect x="80" y="30" width="240" height="200" rx="4" fill="url(#g2frame)"/>
  <rect x="95" y="45" width="210" height="170" rx="2" fill="#fff"/>
