  <rect x="95" y="45" width="210" height="170" rx="2" fill="none" stroke="rgba(196,154,108,0.5)" stroke-width="3"/>
  <!-- Glass shine -->
  <path d="M100 50 L130 80 L100 80 Z" fill="rgba(255,255,255,0.5)"/>
