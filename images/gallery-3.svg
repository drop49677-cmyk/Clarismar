<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="g3bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0f5f8"/>
      <stop offset="100%" stop-color="#e5eff5"/>
    </linearGradient>
    <linearGradient id="g3mirror" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#e0f7fa"/>
      <stop offset="40%" stop-color="#b2ebf2"/>
      <stop offset="100%" stop-color="#80deea"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" rx="12" fill="url(#g3bg)"/>
  <!-- Bathroom wall -->
  <rect x="40" y="20" width="320" height="260" rx="4" fill="#f5f0eb"/>
  <!-- Tile pattern -->
  <line x1="40" y1="85" x2="360" y2="85" stroke="#e0d8d0" stroke-width="0.5"/>
  <line x1="40" y1="150" x2="360" y2="150" stroke="#e0d8d0" stroke-width="0.5"/>
  <line x1="40" y1="215" x2="360" y2="215" stroke="#e0d8d0" stroke-width="0.5"/>
  <line x1="120" y1="20" x2="120" y2="280" stroke="#e0d8d0" stroke-width="0.5"/>
  <line x1="200" y1="20" x2="200" y2="280" stroke="#e0d8d0" stroke-width="0.5"/>
  <line x1="280" y1="20" x2="280" y2="280" stroke="#e0d8d0" stroke-width="0.5"/>
  <!-- Mirror -->
  <rect x="100" y="40" width="200" height="160" rx="6" fill="url(#g3mirror)" stroke="#ccc" stroke-width="2"/>
  <!-- Mirror reflections -->
  <ellipse cx="160" cy="90" rx="25" ry="35" fill="rgba(255,255,255,0.4)"/>
  <path d="M110 50 L140 80 L110 80 Z" fill="rgba(255,255,255,0.5)"/>
  <!-- Sink below -->
  <ellipse cx="200" cy="245" rx="70" ry="25" fill="#fff" stroke="#ccc" stroke-width="1.5"/>
  <rect x="190" y="215" width="20" height="20" rx="4" fill="#bbb"/>
  <circle cx="200" cy="225" r="3" fill="#888"/>
  <!-- Label -->
  <text x="200" y="290" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#0a2540" opacity="0.6">Espejos para banos a medida</text>
</svg>
