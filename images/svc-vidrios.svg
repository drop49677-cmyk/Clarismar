<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" fill="none">
  <defs>
    <linearGradient id="v1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#e8f6f8"/><stop offset="100%" stop-color="#cfeef3"/></linearGradient>
    <linearGradient id="v2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="rgba(255,255,255,0.7)"/><stop offset="100%" stop-color="rgba(56,212,230,0.25)"/></linearGradient>
  </defs>
  <rect width="400" height="260" fill="url(#v1)"/>
  <!-- stacked glass sheets -->
  <rect x="70" y="50" width="180" height="150" rx="4" fill="url(#v2)" stroke="#9bd9e3" stroke-width="2" transform="rotate(-4 160 125)"/>
  <rect x="120" y="60" width="180" height="150" rx="4" fill="url(#v2)" stroke="#9bd9e3" stroke-width="2" transform="rotate(3 210 135)"/>
  <line x1="150" y1="80" x2="200" y2="180" stroke="rgba(255,255,255,0.7)" stroke-width="3"/>
  <line x1="170" y1="80" x2="220" y2="160" stroke="rgba(255,255,255,0.45)" stroke-width="2"/>
  <!-- cutter -->
  <g transform="rotate(35 320 150)"><rect x="312" y="110" width="12" height="80" rx="6" fill="#444"/><rect x="310" y="105" width="16" height="14" rx="3" fill="#c0392b"/><circle cx="318" cy="193" r="6" fill="#888"/></g>
  <text x="200" y="240" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#0a2540" opacity="0.65">Corte de vidrio a medida</text>
</svg>
