<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 700" fill="none">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8f6f8"/>
      <stop offset="100%" stop-color="#d0edf2"/>
    </linearGradient>
    <linearGradient id="glass1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.7)"/>
      <stop offset="100%" stop-color="rgba(56,212,230,0.2)"/>
    </linearGradient>
    <linearGradient id="frame1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B6F47"/>
      <stop offset="100%" stop-color="#5C4033"/>
    </linearGradient>
    <linearGradient id="mirror1" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#e0f7fa"/>
      <stop offset="50%" stop-color="#b2ebf2"/>
      <stop offset="100%" stop-color="#80deea"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="600" height="700" rx="20" fill="url(#bg1)"/>
  <!-- Table surface -->
  <rect x="50" y="520" width="500" height="180" rx="8" fill="#4a3728" opacity="0.3"/>
  <!-- Large glass pane standing -->
  <rect x="120" y="140" width="200" height="380" rx="4" fill="url(#glass1)" stroke="#b0e0e6" stroke-width="2"/>
  <rect x="125" y="145" width="190" height="370" rx="2" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
  <!-- Reflection lines -->
  <line x1="145" y1="160" x2="180" y2="300" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
  <line x1="155" y1="160" x2="190" y2="280" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <!-- Framed mirror -->
  <rect x="370" y="180" width="170" height="220" rx="6" fill="url(#frame1)"/>
  <rect x="382" y="192" width="146" height="196" rx="3" fill="url(#mirror1)"/>
  <ellipse cx="455" cy="260" rx="30" ry="40" fill="rgba(255,255,255,0.3)"/>
  <!-- Small cut glass pieces on table -->
  <rect x="180" y="540" width="80" height="60" rx="2" fill="rgba(173,216,230,0.6)" stroke="#87ceeb" stroke-width="1.5" transform="rotate(-5 220 570)"/>
  <rect x="300" y="550" width="60" height="45" rx="2" fill="rgba(200,230,240,0.5)" stroke="#87ceeb" stroke-width="1" transform="rotate(8 330 572)"/>
  <!-- Glass cutter tool -->
  <rect x="420" y="560" width="8" height="80" rx="4" fill="#333"/>
  <circle cx="424" cy="640" r="5" fill="#666"/>
  <rect x="416" y="555" width="16" height="12" rx="3" fill="#c0392b"/>
  <!-- Text overlay -->
  <text x="300" y="660" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#0a2540" opacity="0.7">Vidrios y Espejos a la Medida</text>
</svg>
